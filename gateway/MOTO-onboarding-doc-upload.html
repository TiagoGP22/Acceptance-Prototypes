    var pc2 = document.createElement("link"); pc2.rel = "preconnect"; pc2.href = "https://fonts.gstatic.com"; pc2.crossOrigin = "anonymous";
    var l = document.createElement("link"); l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap";
    document.head.appendChild(pc1); document.head.appendChild(pc2); document.head.appendChild(l);
  })();
</script>

  .wz-opt.sel:hover { background: var(--teya-lime-200); }

  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

    <circle cx="486" cy="236" r="26" fill="#151515"/>
    <path d="M486 248 v-24 M476 232 l10 -10 l10 10" stroke="#dde048" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="470" y="330" width="260" height="150" rx="16" fill="none" stroke="#b3b3b3" stroke-width="4" stroke-dasharray="14 12"/>
    <path d="M600 360 v60 M576 384 l24 -24 l24 24" stroke="#151515" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="470" y="520" width="260" height="20" rx="10" fill="#f0f1f3"/>

</template>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wizard-fields.jsx"></script>
<script type="text/babel" src="moto-upload.jsx"></script>
<script type="text/babel" src="moto-steps.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useLayoutEffect } = React;
const T = window.TeyaDesignSystem_68184f;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "gateMode": "soft",
  "toggleLabel": "MOTO (Manual Entry)",
  "showReminder": true
}/*EDITMODE-END*/;

const STEPS = ["Company details", "Offer selection", "Add services and products", "Review"];

function Shell({ children }) {
  return (
    <div style={{ display: "flex", minHeight: "100vh", width: "100%", background: "#ffffff" }}>
      {/* Sidebar */}
      <aside style={{ width: 232, borderRight: "1px solid var(--border-subtle)", padding: "18px 14px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, padding: "4px 8px 22px" }}>
          <span style={{ width: 30, height: 30, borderRadius: 8, background: "var(--teya-black)", display: "inline-flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ width: 13, height: 13, borderRadius: 4, background: "var(--brand-lime)" }} />
          </span>
          <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>teya</span>
        </div>
        <div className="sb-item">
          <i data-lucide="settings" style={{ width: 20, height: 20 }} /> Partner management
          <i data-lucide="external-link" style={{ width: 15, height: 15, marginLeft: "auto", color: "var(--text-tertiary)" }} />
        </div>
        <div className="sb-item">
          <i data-lucide="users" style={{ width: 20, height: 20 }} /> Sales reports
          <i data-lucide="chevron-up" style={{ width: 16, height: 16, marginLeft: "auto", color: "var(--text-tertiary)" }} />
        </div>
        <div style={{ paddingLeft: 18, display: "flex", flexDirection: "column", gap: 2, marginTop: 2 }}>
          <div className="sb-sub">Merchants</div>
          <div className="sb-sub">Offers</div>
          <div className="sb-sub active">Pricing</div>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <header style={{ height: 56, borderBottom: "1px solid var(--border-subtle)", display: "flex", alignItems: "center", justifyContent: "flex-end", padding: "0 24px" }}>
          <span style={{ width: 34, height: 34, borderRadius: "50%", boxShadow: "inset 0 0 0 1.5px var(--border-strong)", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "var(--text-secondary)" }}>
            <i data-lucide="user" style={{ width: 18, height: 18 }} />
          </span>
        </header>
        <main style={{ flex: 1, overflow: "auto", padding: "0 24px 60px" }}>
          {children}
        </main>
      </div>
    </div>
  );
}

function Progress({ step }) {
  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 0 28px" }}>
      <div style={{ height: 4, borderRadius: 999, background: "var(--surface-sunken)", overflow: "hidden" }}>
        <div style={{ height: "100%", width: ((step + 1) / STEPS.length * 100) + "%", background: "var(--brand-lime)", borderRadius: 999, transition: "width .3s var(--ease-standard)" }} />
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    category: "Food and Beverage", activity: "Bar/Pub/Club", country: "Hungary",
    tpv: "100", atv: "10,000", operates: "", moto: false, ecom: false, profile: false,
  });
  const [method, setMethod] = useState("upload");
  const [docs, setDocs] = useState([]);
  const [rejected, setRejected] = useState([]);
  const [requestSent, setRequestSent] = useState(false);
  const [tried, setTried] = useState(false);
  const [products, setProducts] = useState({ sunmi: 0, paxA80: 1, paxA77: 0 });
  const [payMode, setPayMode] = useState("once");
  const [offerTitle, setOfferTitle] = useState("");
  const [saved, setSaved] = useState(false);

  useLayoutEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const addDocs = (fileList) => {
    const { ok, rejected: rej } = window.classifyFiles(fileList);
    if (ok.length) { setDocs((d) => [...d, ...ok]); setTried(false); }
    setRejected(rej);
  };
  const removeDoc = (id) => setDocs((d) => d.filter((x) => x.id !== id));
  const setCategory = (cat) => setForm((f) => ({ ...f, category: cat, activity: "" }));

  const motoEligible = window.WIZARD.isMotoEligible(form.activity);
  const motoOn = form.moto && motoEligible;
  const motoSatisfied = !motoOn || docs.length > 0 || requestSent;
  const showError = tried && motoOn && method === "upload" && docs.length === 0;

  const motoProps = {
    method, setMethod, docs, addDocs, removeDoc, rejected,
    requestSent, sendRequest: () => { setRequestSent(true); setTried(false); },
    cancelRequest: () => setRequestSent(false), showError,
  };

  const goNext = () => {
    if (step === 0 && t.gateMode === "strict" && !motoSatisfied) { setTried(true); return; }
    setStep((s) => Math.min(STEPS.length - 1, s + 1));
  };
  const goBack = () => setStep((s) => Math.max(0, s - 1));

  const confirmDisabled = !offerTitle.trim() || (motoOn && !motoSatisfied);

  if (saved) return <Shell><SavedScreen form={{ ...form, moto: motoOn }} requestSent={requestSent} docs={docs} onReset={() => { setSaved(false); setStep(0); }} /></Shell>;

  let body;
  if (step === 0) body = <window.CompanyDetails form={form} set={set} setCategory={setCategory} toggleLabel={t.toggleLabel} motoEligible={motoEligible} motoProps={motoProps} />;
  else if (step === 1) body = <window.OfferSelection moto={motoOn} />;
  else if (step === 2) body = <window.AddProducts products={products} setQty={(id, d) => setProducts((p) => ({ ...p, [id]: Math.max(0, p[id] + d) }))} payMode={payMode} setPayMode={setPayMode} />;
  else body = <window.Review offerTitle={offerTitle} setOfferTitle={setOfferTitle} moto={motoOn} motoSatisfied={motoSatisfied} requestSent={requestSent} onJump={() => setStep(0)} />;

  const reminder = t.showReminder && motoOn && !motoSatisfied && (step === 1 || step === 2);

  return (
    <Shell>
      <Progress step={step} />
      <div style={{ maxWidth: 720, margin: "0 auto" }} key={step}>
        {reminder && <window.MotoReminder onJump={() => setStep(0)} />}
        {body}

        {/* Footer */}
        <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 12, marginTop: 36 }}>
          {step === STEPS.length - 1 && confirmDisabled && motoOn && !motoSatisfied && (
            <span style={{ fontSize: 13, color: "var(--warning-text)", fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 6 }}>
              <i data-lucide="lock" style={{ width: 14, height: 14 }} /> Add MOTO documents to confirm
            </span>
          )}
          {step > 0 && <T.Button level="secondary" onClick={goBack}>Back</T.Button>}
          {step < STEPS.length - 1
            ? <T.Button level="primary" onClick={goNext}>Continue</T.Button>
            : <T.Button level="primary" disabled={confirmDisabled} onClick={() => setSaved(true)}>Confirm and save</T.Button>}
        </div>
      </div>

      <window.TweaksPanel>
        <window.TweakSection label="MOTO doc gate" />
        <window.TweakRadio label="Continue gating" value={t.gateMode}
          options={[{ value: "soft", label: "Soft" }, { value: "strict", label: "Strict" }]}
          onChange={(v) => setTweak("gateMode", v)} />
        <div style={{ fontSize: 11.5, color: "#888", margin: "-4px 2px 6px", lineHeight: 1.4 }}>
          Soft: rep can keep building, hard gate at Review. Strict: blocks Continue on step 1.
        </div>
        <window.TweakToggle label="Carry-forward reminder" value={t.showReminder} onChange={(v) => setTweak("showReminder", v)} />
        <window.TweakSection label="Naming" />
        <window.TweakRadio label="Toggle label" value={t.toggleLabel}
          options={[{ value: "MOTO (Manual Entry)", label: "MOTO (Manual Entry)" }, { value: "MOTO", label: "MOTO" }]}
          onChange={(v) => setTweak("toggleLabel", v)} />
      </window.TweaksPanel>
    </Shell>
  );
}

function SavedScreen({ form, requestSent, docs, onReset }) {
  return (
    <div style={{ maxWidth: 560, margin: "80px auto", textAlign: "center" }}>
      <span style={{ width: 64, height: 64, borderRadius: "50%", background: "var(--positive-surface)", color: "var(--positive-text)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
        <i data-lucide="check" style={{ width: 30, height: 30 }} />
      </span>
      <h1 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px" }}>Offer saved</h1>
      <p style={{ fontSize: 15, color: "var(--text-secondary)", lineHeight: 1.55, margin: "0 0 22px" }}>
        The proposal has been saved{form.moto ? " and MOTO has been added" : ""}. {form.moto && "MOTO approval is subject to compliance review."}
      </p>
      {form.moto && (
        <div style={{ display: "inline-flex", alignItems: "center", gap: 10, padding: "12px 18px", borderRadius: 12, boxShadow: "inset 0 0 0 1px var(--border-default)", marginBottom: 24, textAlign: "left" }}>
          <i data-lucide={requestSent ? "clipboard-check" : "file-check-2"} style={{ width: 20, height: 20, color: "var(--text-secondary)" }} />
          <div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>
              {requestSent ? "Transaction history added to merchant information request" : docs.length + " document" + (docs.length === 1 ? "" : "s") + " attached to KYC record"}
            </div>
            <div style={{ fontSize: 12.5, color: "var(--text-tertiary)" }}>
              {requestSent ? "MOTO pending until documents are reviewed" : "Ready for CDD review"}
            </div>
          </div>
        </div>
      )}
      <div><button onClick={onReset} style={{ border: "none", background: "transparent", color: "var(--text-secondary)", fontSize: 14, fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Start a new offer</button></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
