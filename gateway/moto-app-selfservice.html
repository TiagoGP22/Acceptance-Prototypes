function BellButton({ unreadCount, onClick, pulsing }) {
  return (
    <button onClick={onClick} style={{ width: 40, height: 40, borderRadius: T.radius.full, background: "rgba(245,245,240,0.8)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", border: "none", color: T.color.primary, flexShrink: 0, position: "relative", animation: pulsing ? "bellPulse .5s ease-out" : "none" }}>
      {I.bell}
      {unreadCount > 0 && (
        <span style={{
          position: "absolute", top: 2, right: 2,
          minWidth: 18, height: 18, borderRadius: 9,
          background: T.color.negative, color: "#fff",
          fontSize: 10, fontWeight: 700, fontFamily: T.font,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "0 4px",
          border: "2px solid rgba(245,245,240,0.8)",
          animation: "badgePop .3s ease-out",
          lineHeight: 1,
        }}>
          {unreadCount > 99 ? "99+" : unreadCount}
        </span>
      )}
    </button>
  );
}

  active: { label: "Active" },
  inactive: { label: "Inactive" },
  delivered: { label: "Delivered" },
  in_transit: { label: "In transit" },
  pending_review: { label: "Pending review" },
};

function statusColor(status) {
  switch (status) {
    case "active": return { bg: T.color.positiveBg, fg: T.color.positive };
    case "inactive": return { bg: T.color.warningBg, fg: T.color.warning };
    case "delivered": return { bg: "rgba(143,134,118,0.1)", fg: T.color.secondary };
    case "in_transit": return { bg: T.color.infoBg, fg: T.color.info };
    case "pending_review": return { bg: T.color.warningBg, fg: T.color.warning };
    default: return { bg: T.color.bgElevated, fg: T.color.secondary };
  }
}

function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, [onDone]);
  const isOk = type === "success";
  return <div style={{ position: "absolute", top: 110, left: 12, right: 12, zIndex: 30, padding: "12px 16px", borderRadius: T.radius.md, fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 8, background: isOk ? T.color.positiveBg : T.color.warningBg, color: isOk ? T.color.positive : T.color.warning, boxShadow: "0 4px 16px rgba(0,0,0,0.08)" }}>{isOk && <span>{I.check}</span>}{msg}</div>;
}

function Sheet({ open, onClose, children }) {
  if (!open) return null;
  // Portal-style: render at phone frame level using fixed positioning constrained to phone dimensions
  const phoneEl = document.getElementById("phone-frame");
  const rect = phoneEl ? phoneEl.getBoundingClientRect() : { top: 0, left: 0, width: 393, height: 852 };
  return ReactDOM.createPortal(
    <div style={{ position: "fixed", top: rect.top, left: rect.left, width: rect.width, height: rect.height, background: "rgba(0,0,0,.45)", zIndex: 50, display: "flex", alignItems: "flex-end", borderRadius: 44, overflow: "hidden" }} onClick={onClose}>
      <div style={{ width: "100%", maxHeight: "85%", background: T.color.bgDefault, borderRadius: `${T.radius.xl}px ${T.radius.xl}px 0 0`, overflow: "auto" }} onClick={e => e.stopPropagation()}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: T.color.borderMed, margin: "12px auto 16px" }} />
        <div style={{ padding: "0 16px 32px" }}>{children}</div>
      </div>
    </div>,
    phoneEl || document.body
  );
}

function Popover({ open, onClose, items }) {
  if (!open) return null;
  return (
    <>
      <div style={{ position: "fixed", inset: 0, zIndex: 40 }} onClick={onClose} />
      <div style={{ position: "absolute", top: 108, right: 16, zIndex: 41, background: T.color.bgDefault, borderRadius: T.radius.md, boxShadow: "0 8px 32px rgba(0,0,0,0.14)", padding: "4px 0", minWidth: 220 }}>

}

  const [open, setOpen] = useState(false);

    <div style={{ position: "relative" }}>

              onMouseLeave={e => { if (o.value !== value) e.currentTarget.style.background = "transparent"; }}>{o.label}</div>
          ))}
        </div>
      </>}
    </div>
  );
}

function DetailScreen({ nav, goBack, termId, terminals, setTerminals }) {
  const t = terminals.find(x => x.id === termId) || terminals[0];
  const [toast, setToast] = useState(null);
  const [popover, setPopover] = useState(false);
  const [showPin, setShowPin] = useState(false);
  const [showSwap, setShowSwap] = useState(false);
  const [showDeactivate, setShowDeactivate] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [draftName, setDraftName] = useState(t.name);
  const [pin, setPin] = useState("");
  const [pinC, setPinC] = useState("");
  const [pinErr, setPinErr] = useState("");
  const [codeCopied, setCodeCopied] = useState(false);

  const isActive = t.status === "active";
  const isDelivered = t.status === "delivered";
  const isTransit = t.status === "in_transit";
  const isInactive = t.status === "inactive";
  const st = STATUS[t.status];

  const saveName = () => {
    if (draftName.trim() && draftName !== t.name) {
      setTerminals(p => p.map(x => x.id === t.id ? { ...x, name: draftName.trim() } : x));
      setToast({ msg: "Name updated", type: "success" });
    }
    setEditingName(false);
  };

  const handleActivate = () => {
    setTerminals(p => p.map(x => x.id === t.id ? { ...x, status: "active", activated: "23 Mar 2026", pairingCode: null } : x));
    setToast({ msg: `${t.name} activated successfully`, type: "success" });
  };

  const handleDeactivate = () => {
    setTerminals(p => p.map(x => x.id === t.id ? { ...x, status: "inactive" } : x));
    setShowDeactivate(false);
    setToast({ msg: `${t.name} deactivated`, type: "success" });
  };

  const handlePin = () => {
    if (pin.length < 4) { setPinErr("PIN must be 4 digits"); return; }
    if (pin !== pinC) { setPinErr("PINs don't match. Please try again."); return; }
    setShowPin(false); setPin(""); setPinC(""); setPinErr("");
    setToast({ msg: "PIN updated. Terminal will prompt for the new PIN.", type: "success" });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100%", position: "relative" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
      <div style={{ background: T.color.oliveGrad, flexShrink: 0, position: "relative" }}>
        <StatusBar />
        <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 16px 0" }}>
          <Btn40 onClick={goBack}>{I.close}</Btn40>
          {(isActive || isInactive) && <Btn40 onClick={() => setPopover(!popover)}>{I.more}</Btn40>}
        </div>
        <Popover open={popover} onClose={() => setPopover(false)} items={[
          { icon: I.swap, label: "Swap card machine", action: () => setShowSwap(true) },
          ...(isActive ? [{ icon: I.deactivate, label: "Deactivate terminal", danger: true, action: () => setShowDeactivate(true) }] : []),
        ]} />
        <div style={{ textAlign: "center", padding: "16px 16px 24px" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
            {editingName ? (
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input value={draftName} onChange={e => setDraftName(e.target.value)} autoFocus
                  style={{ fontSize: 26, fontWeight: 700, textAlign: "center", border: "none", borderBottom: `2px solid ${T.color.primary}`, background: "transparent", outline: "none", fontFamily: T.font, padding: "0 4px", width: Math.max(120, draftName.length * 14), color: T.color.primary }}
                  onKeyDown={e => e.key === "Enter" && saveName()} />
                <Btn40 onClick={saveName} style={{ background: T.color.positiveBg, width: 36, height: 36 }}><span style={{ color: T.color.positive }}>{I.check}</span></Btn40>
              </div>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }} onClick={() => setEditingName(true)}>
                <span style={{ fontSize: 26, fontWeight: 700, letterSpacing: -.3 }}>{t.name}</span>
                <span style={{ color: T.color.tertiary, flexShrink: 0 }}>{I.edit}</span>
              </div>
            )}
          </div>
          <div style={{ marginTop: 8 }}><Badge type={t.status}>{st.label}</Badge></div>
          <div style={{ fontSize: 14, color: T.color.secondary, marginTop: 6 }}>{t.model} {"\u00b7"} {t.serial}</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "16px 0 0" }}>
        {(isDelivered || isTransit) && t.pairingCode && (
          <Card style={{ borderLeft: `3px solid ${isDelivered ? T.color.positive : T.color.info}` }}>
            <div style={{ padding: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <span style={{ color: isDelivered ? T.color.positive : T.color.info }}>{I.key}</span>
                <span style={{ fontSize: 14, fontWeight: 600, color: T.color.secondary }}>Pairing code</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                <span style={{ fontSize: 28, fontWeight: 700, letterSpacing: 2, fontFamily: "'SF Mono', 'Fira Code', monospace", color: isTransit ? T.color.tertiary : T.color.primary }}>{t.pairingCode}</span>
                {isDelivered && (
                  <button onClick={() => { setCodeCopied(true); setTimeout(() => setCodeCopied(false), 2000); }}
                    style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: T.radius.sm, border: `1px solid ${T.color.borderMed}`, background: codeCopied ? T.color.positiveBg : T.color.bgDefault, fontSize: 12, fontWeight: 500, fontFamily: T.font, cursor: "pointer", color: codeCopied ? T.color.positive : T.color.secondary }}>
                    {codeCopied ? <>{I.check} Copied</> : <>{I.copy} Copy</>}
                  </button>
                )}
              </div>
              <div style={{ fontSize: 13, color: T.color.secondary, lineHeight: 1.45 }}>
                {isTransit ? "Code available once delivered. We'll notify you when your terminal arrives." : `Enter this code on your ${t.model} to activate.`}
              </div>
            </div>
          </Card>
        )}

        <Card>
          <div style={{ padding: 16 }}>
            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 10 }}>Device info</div>
            <DataRow k="Model" v={t.model} />
            <DataRow k="Serial number" v={t.serial} />
            <DataRow k="Store" v={t.store} />
            {t.activated && <DataRow k="Activated" v={t.activated} />}
            {isTransit && <DataRow k="Estimated delivery" v="26 Mar 2026" />}
            <DataRow k="Plan" v={t.plan} />
          </div>
        </Card>

        <Card>
          <div style={{ padding: 16 }}>
            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 10 }}>Billing</div>
            <DataRow k="Monthly cost" v={`\u00a3${t.cost}.00`} />
            <DataRow k="Next bill" v={isActive ? t.nextBill : "Pending activation"} />
            <div style={{ textAlign: "center", fontSize: 14, fontWeight: 500, color: T.color.secondary, paddingTop: 6, cursor: "pointer" }}>{"View billing history \u203A"}</div>
          </div>
        </Card>

        {isActive && (
          <Card>
            <div style={{ padding: "4px 0" }}>
              <QuickAction icon={I.lock} label="Update terminal PIN" onClick={() => setShowPin(true)} />
              <QuickAction icon={I.sliders} label="Terminal configuration" onClick={() => {}} />
              <QuickAction icon={I.gear} label="Accepted payments & fees" onClick={() => nav("payConfig", t.id)} last />
            </div>
          </Card>
        )}

        {isInactive && <div style={{ padding: "4px 12px" }}><PrimaryBtn label="Reactivate card machine" onClick={() => {
          setTerminals(p => p.map(x => x.id === t.id ? { ...x, status: "active", activated: "23 Mar 2026" } : x));
          setToast({ msg: `${t.name} reactivated`, type: "success" });
        }} /></div>}
        {isTransit && <div style={{ padding: "4px 12px" }}><div style={{ textAlign: "center", fontSize: 14, fontWeight: 500, color: T.color.info, cursor: "pointer", padding: 12 }}>Notify me when delivered</div></div>}

        <div style={{ height: isDelivered ? 80 : 24 }} />
      </div>

      {isDelivered && (
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 25, padding: "16px 16px 28px", background: "linear-gradient(transparent, #f6f5f3 20px, #f6f5f3)" }}>
          <PrimaryBtn label="Activate card machine" onClick={handleActivate} />
        </div>
      )}

      <Sheet open={showPin} onClose={() => { setShowPin(false); setPinErr(""); }}>
        <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Update PIN</div>
        <div style={{ fontSize: 14, color: T.color.secondary, marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 8, lineHeight: 1.45 }}><span style={{ flexShrink: 0, marginTop: 1 }}>{I.shield}</span>For your security, only authorised users should change the PIN.</div>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, color: T.color.secondary, marginBottom: 6 }}>New PIN</div>
          <input type="password" maxLength={4} value={pin} onChange={e => { setPin(e.target.value.replace(/\D/g, "")); setPinErr(""); }} placeholder="Enter 4-digit PIN" style={{ width: "100%", padding: "12px 16px", borderRadius: T.radius.md, border: `1.5px solid ${pinErr ? T.color.negative : T.color.borderMed}`, fontSize: 16, fontFamily: T.font, outline: "none", background: T.color.bgDefault, color: T.color.primary, boxSizing: "border-box" }} />
        </div>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, color: T.color.secondary, marginBottom: 6 }}>Confirm PIN</div>
          <input type="password" maxLength={4} value={pinC} onChange={e => { setPinC(e.target.value.replace(/\D/g, "")); setPinErr(""); }} placeholder="Re-enter PIN" style={{ width: "100%", padding: "12px 16px", borderRadius: T.radius.md, border: `1.5px solid ${pinErr ? T.color.negative : T.color.borderMed}`, fontSize: 16, fontFamily: T.font, outline: "none", background: T.color.bgDefault, color: T.color.primary, boxSizing: "border-box" }} />
        </div>
        {pinErr && <div style={{ fontSize: 14, color: T.color.negative, marginBottom: 12 }}>{pinErr}</div>}
        <PrimaryBtn label="Update PIN" onClick={handlePin} />
        <SecondaryBtn label="Cancel" onClick={() => { setShowPin(false); setPinErr(""); }} />
      </Sheet>
      <Sheet open={showSwap} onClose={() => setShowSwap(false)}>
        <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Swap card machine</div>
        <div style={{ fontSize: 14, color: T.color.secondary, marginBottom: 20, lineHeight: 1.5 }}>Replace this terminal with another device. The new device will inherit all settings.</div>
        <Card style={{ margin: "0 0 12px" }}>
          <div style={{ padding: "0 4px" }}>
            <ListRow icon={I.terminal} iconBg={T.color.bgElevated} label="New Teya Move" desc="SN-1120-D \u00b7 Unassigned" last
              onClick={() => { setShowSwap(false); setToast({ msg: `Swap complete. ${t.name} now uses the new device.`, type: "success" }); }} />
          </div>
        </Card>
        <SecondaryBtn label="Cancel" onClick={() => setShowSwap(false)} />
      </Sheet>
      <Sheet open={showDeactivate} onClose={() => setShowDeactivate(false)}>
        <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Deactivate terminal?</div>
        <div style={{ fontSize: 14, color: T.color.secondary, marginBottom: 8, lineHeight: 1.5 }}>This will stop all payments on <strong>{t.name}</strong>. The terminal will no longer accept transactions.</div>
        <div style={{ fontSize: 14, color: T.color.secondary, marginBottom: 20, lineHeight: 1.5 }}>You can reactivate it later or swap it with another device.</div>
        <PrimaryBtn label="Deactivate" onClick={handleDeactivate} danger />
        <SecondaryBtn label="Cancel" onClick={() => setShowDeactivate(false)} />
      </Sheet>
    </div>
  );
}

function PayConfigScreen({ nav, goBack, preselect, terminals, motoActive, payLinksActive }) {
  const preTerminal = typeof preselect === "number" ? terminals.find(x => x.id === preselect) : null;
  const isEcomScope = preselect === "ecommerce";
  const initialScope = preTerminal ? `terminal-${preTerminal.id}` : (isEcomScope ? "ecommerce" : "company");
  const [scope, setScope] = useState(initialScope);
  const scopedTerminal = scope.startsWith("terminal-") ? terminals.find(x => x.id === parseInt(scope.split("-")[1])) : null;
  const isTerminalScope = !!scopedTerminal;
  const isProductScope = scope === "ecommerce";

  const [amex, setAmex] = useState(scopedTerminal?.overrides?.amex !== undefined ? scopedTerminal.overrides.amex : true);
  const [diners, setDiners] = useState(false);
  const [discover, setDiscover] = useState(false);
  const [cup, setCup] = useState(false);
  const [dcc, setDcc] = useState(true);
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [showApplyModal, setShowApplyModal] = useState(false);
  const [applyChoice, setApplyChoice] = useState("all");
  const [pendingToggle, setPendingToggle] = useState(null);

  const activeTerminals = terminals.filter(t => t.status === "active");
  const hasOverrides = activeTerminals.some(t => t.overrides);
  const ecomStore = ALL_STORES.find(s => s.type === "ecommerce");

  const handleToggle = (name, fn) => () => {
    fn(p => !p);
    setDirty(true);
    if (!isTerminalScope && !isProductScope) {
      setPendingToggle(name);
      setShowApplyModal(true);
    }
  };

  const save = () => {
    setSaving(true);
    setTimeout(() => { setSaving(false); setDirty(false); setToast({ msg: "Payment configuration updated.", type: "success" }); }, 1500);
  };

  const scopeDesc = isTerminalScope
    ? <>Viewing settings for <strong>{scopedTerminal.name}</strong>. Changes here apply to this terminal only.</>
    : isProductScope
    ? <>Viewing settings for your <strong>E-commerce</strong> product ({ecomStore?.name}). Changes here apply to your online checkout only.</>
    : "These settings apply to all your stores and products. You can customise them for a specific store or product.";

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100%", position: "relative" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
      <TopBar title="Payment and fee configuration" onBack={goBack} olive />
      <div style={{ flex: 1, overflowY: "auto", padding: "8px 0 0" }}>
        <div style={{ padding: "0 16px 12px", fontSize: 13, color: T.color.secondary, lineHeight: 1.45 }}>
          {scopeDesc}
        </div>
        {isTerminalScope && (
          <div style={{ margin: "0 12px 12px", padding: "10px 14px", borderRadius: T.radius.md, background: T.color.infoBg, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: T.color.info }}>
            <span>{I.terminal}</span>
            <div style={{ flex: 1 }}><strong>{scopedTerminal.name}</strong> {"\u00b7"} {scopedTerminal.store}</div>
            <button onClick={() => { setScope("company"); setAmex(true); }} style={{ fontSize: 12, fontWeight: 600, color: T.color.info, background: "none", border: "none", cursor: "pointer", fontFamily: T.font, textDecoration: "underline" }}>View company</button>
          </div>
        )}
        {isProductScope && (
          <div style={{ margin: "0 12px 12px", padding: "10px 14px", borderRadius: T.radius.md, background: T.color.infoBg, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: T.color.info }}>
            <span>{I.cart}</span>
            <div style={{ flex: 1 }}><strong>E-commerce</strong> {"\u00b7"} {ecomStore?.name}</div>
            <button onClick={() => { setScope("company"); setAmex(true); }} style={{ fontSize: 12, fontWeight: 600, color: T.color.info, background: "none", border: "none", cursor: "pointer", fontFamily: T.font, textDecoration: "underline" }}>View company</button>
          </div>
        )}
        <div style={{ display: "flex", gap: 8, padding: "0 16px 16px", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
          <FilterChip label="Company (default)" active={scope === "company"} onClick={() => { setScope("company"); setAmex(true); }} />
          {STORES.map(s => <FilterChip key={s} label={s} active={scope === s} onClick={() => setScope(s)} />)}
          <FilterChip label="E-commerce" active={scope === "ecommerce"} onClick={() => setScope("ecommerce")} />
          {activeTerminals.map(t => <FilterChip key={t.id} label={t.name} active={scope === `terminal-${t.id}`} onClick={() => { setScope(`terminal-${t.id}`); if (t.overrides?.amex !== undefined) setAmex(t.overrides.amex); else setAmex(true); }} />)}
        </div>

        <Card>
          <div style={{ padding: 16 }}>

// ── NOTIFICATIONS SCREEN ─────────────────────────────────────
function NotificationsScreen({ nav, goBack, notifications, setNotifications }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  const [toast, setToast] = useState(null);
  const unreadCount = notifications.filter(n => !n.read).length;

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 800);
    return () => clearTimeout(t);
  }, []);

  const markAllRead = () => {
    setNotifications(prev => prev.map(n => ({ ...n, read: true })));
    setToast({ msg: "All notifications marked as read", type: "success" });
  };

  const markOneRead = (id) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
  };

  const SkeletonRow = () => (
    <div style={{ display: "flex", gap: 12, padding: "14px 16px" }}>
      <div style={{ width: 40, height: 40, borderRadius: T.radius.md, background: "linear-gradient(90deg, #f0efed 0px, #e8e7e4 40px, #f0efed 80px)", backgroundSize: "200px 100%", animation: "skeletonShimmer 1.5s infinite linear", flexShrink: 0 }} />
      <div style={{ flex: 1 }}>
        <div style={{ width: "60%", height: 14, borderRadius: 4, background: "linear-gradient(90deg, #f0efed 0px, #e8e7e4 40px, #f0efed 80px)", backgroundSize: "200px 100%", animation: "skeletonShimmer 1.5s infinite linear", marginBottom: 8 }} />
        <div style={{ width: "90%", height: 12, borderRadius: 4, background: "linear-gradient(90deg, #f0efed 0px, #e8e7e4 40px, #f0efed 80px)", backgroundSize: "200px 100%", animation: "skeletonShimmer 1.5s infinite linear", marginBottom: 6 }} />
        <div style={{ width: "30%", height: 10, borderRadius: 4, background: "linear-gradient(90deg, #f0efed 0px, #e8e7e4 40px, #f0efed 80px)", backgroundSize: "200px 100%", animation: "skeletonShimmer 1.5s infinite linear" }} />
      </div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100%", position: "relative" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
      <div style={{ position: "sticky", top: 0, zIndex: 20, background: T.color.bgSubtle, flexShrink: 0 }}>
        <StatusBar />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Btn40 onClick={goBack}>{I.back}</Btn40>
            <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.3 }}>Notifications</span>
          </div>
          <Btn40 onClick={() => nav("notifPrefs")} style={{ background: T.color.bgElevated }}>
            {I.gear}
          </Btn40>
        </div>
        {!loading && !error && notifications.length > 0 && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px 12px" }}>
            <span style={{ fontSize: 13, color: T.color.secondary }}>
              {unreadCount > 0 ? `${unreadCount} unread` : "All caught up"}
            </span>
            {unreadCount > 0 && (
              <button onClick={markAllRead} style={{ fontSize: 13, fontWeight: 600, color: T.color.accent, background: "none", border: "none", cursor: "pointer", fontFamily: T.font, textDecoration: "underline" }}>Mark all as read</button>
            )}
          </div>
        )}
      </div>

      <div style={{ flex: 1, overflowY: "auto" }}>
        {/* Loading state */}
        {loading && (
          <div>
            <SkeletonRow /><SkeletonRow /><SkeletonRow /><SkeletonRow /><SkeletonRow />
          </div>
        )}

        {/* Error state */}
        {!loading && error && (
          <div style={{ padding: "60px 32px", textAlign: "center" }}>
            <div style={{ width: 56, height: 56, borderRadius: 28, background: T.color.negativeBg, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke={T.color.negative} strokeWidth="1.5"/><path d="M12 8V13" stroke={T.color.negative} strokeWidth="1.5" strokeLinecap="round"/><circle cx="12" cy="16" r="1" fill={T.color.negative}/></svg>
            </div>
            <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 6 }}>We couldn't load your notifications</div>
            <div style={{ fontSize: 14, color: T.color.secondary, marginBottom: 20, lineHeight: 1.45 }}>Check your connection and try again.</div>
            <button onClick={() => { setError(false); setLoading(true); setTimeout(() => setLoading(false), 800); }}
              style={{ padding: "10px 28px", borderRadius: T.radius.md, background: T.color.primary, color: "#fff", fontSize: 15, fontWeight: 600, fontFamily: T.font, border: "none", cursor: "pointer" }}>
              Try again
            </button>
          </div>
        )}

        {/* Empty state */}
        {!loading && !error && notifications.length === 0 && (
          <div style={{ padding: "60px 32px", textAlign: "center" }}>
            <div style={{ width: 56, height: 56, borderRadius: 28, background: T.color.bgElevated, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", color: T.color.secondary }}>
              {I.bell}
            </div>
            <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 6 }}>No notifications yet</div>
            <div style={{ fontSize: 14, color: T.color.secondary, lineHeight: 1.45 }}>We'll show important updates here when you have them.</div>
          </div>
        )}

        {/* All-read state */}
        {!loading && !error && notifications.length > 0 && unreadCount === 0 && (
          <div style={{ padding: "20px 32px 12px", textAlign: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 500, color: T.color.positive, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              {I.check} You're all caught up
            </div>
          </div>
        )}

        {/* Notification list */}
        {!loading && !error && notifications.length > 0 && (
          <div>
            {notifications.map((n, i) => {
              const nc = NOTIF_COLORS[n.type] || NOTIF_COLORS.report;
              return (
                <div key={n.id}
                  onClick={() => markOneRead(n.id)}
                  style={{
                    display: "flex", gap: 12, padding: "14px 16px",
                    cursor: "pointer",
                    background: n.read ? "transparent" : "rgba(94,165,0,0.03)",
                    borderBottom: i < notifications.length - 1 ? `1px solid ${T.color.borderLight}` : "none",
                    transition: "background .15s",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = T.color.bgElevated}
                  onMouseLeave={e => e.currentTarget.style.background = n.read ? "transparent" : "rgba(94,165,0,0.03)"}
                >
                  {/* Category icon */}
                  <div style={{ width: 40, height: 40, borderRadius: T.radius.md, background: nc.bg, display: "flex", alignItems: "center", justifyContent: "center", color: nc.fg, flexShrink: 0 }}>
                    {NOTIF_ICONS[n.type]}
                  </div>
                  {/* Content */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 15, fontWeight: n.read ? 400 : 600, lineHeight: "20px", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{n.title}</span>
                      {!n.read && <span style={{ width: 8, height: 8, borderRadius: 4, background: T.color.info, flexShrink: 0 }} />}
                    </div>
                    <div style={{ fontSize: 13, color: T.color.secondary, lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{n.body}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                      <span style={{ fontSize: 11, fontWeight: 500, color: nc.fg, background: nc.bg, padding: "1px 8px", borderRadius: T.radius.full }}>{n.category}</span>
                      <span style={{ fontSize: 11, color: T.color.tertiary }}>{n.time}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{ height: 16 }} />
      </div>
    </div>
  );
}

// ── NOTIFICATION PREFERENCES ────────────────────────────────
function NotifPrefsScreen({ goBack }) {
  const [pblPaid, setPblPaid] = useState(true);
  const [refundTriggered, setRefundTriggered] = useState(true);
  const [refundCompleted, setRefundCompleted] = useState(true);
  const [payoutCompleted, setPayoutCompleted] = useState(true);
  const [marketing, setMarketing] = useState(true);
  const [settlementReport, setSettlementReport] = useState(true);
  const [settlementEmail, setSettlementEmail] = useState(true);
  const [pblReport, setPblReport] = useState(true);
  const [pblEmail, setPblEmail] = useState(false);
  const [toast, setToast] = useState(null);

  const PrefRow = ({ label, desc, on, onToggle, last, indent }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: indent ? "10px 16px 10px 28px" : "12px 16px", borderBottom: last ? "none" : `1px solid ${T.color.borderLight}` }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 500 }}>{label}</div>
        {desc && <div style={{ fontSize: 13, color: T.color.secondary, marginTop: 1, lineHeight: 1.4 }}>{desc}</div>}
      </div>
      <Toggle on={on} onToggle={onToggle} />
    </div>
  );

  const ChannelChip = ({ label, active, onClick }) => (
    <button onClick={onClick} style={{ padding: "5px 14px", borderRadius: T.radius.full, fontSize: 12, fontWeight: 500, fontFamily: T.font, cursor: "pointer", border: active ? "none" : `1px solid ${T.color.borderMed}`, background: active ? T.color.primary : T.color.bgDefault, color: active ? "#fff" : T.color.primary, transition: "all .15s" }}>{label}</button>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100%", position: "relative" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
      <TopBar title="Preferences" onBack={goBack} />
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 0 0" }}>
        <div style={{ padding: "0 16px 12px", fontSize: 13, color: T.color.secondary, lineHeight: 1.45 }}>
          Choose which notifications you receive. Changes apply immediately.
        </div>

        {/* Section 1: Operational alerts */}
        <SectionLabel>Operational alerts</SectionLabel>
        <Card>
          <PrefRow label="Payout completed" desc="When money lands in your bank account" on={payoutCompleted} onToggle={() => setPayoutCompleted(p => !p)} />
          <PrefRow label="PBL is paid" desc="When a pay-by-link payment is received" on={pblPaid} onToggle={() => setPblPaid(p => !p)} />
          <PrefRow label="Refund triggered" desc="When a refund is initiated" on={refundTriggered} onToggle={() => setRefundTriggered(p => !p)} />
          <PrefRow label="Refund completed" desc="When a refund finishes processing" on={refundCompleted} onToggle={() => setRefundCompleted(p => !p)} last />
        </Card>

        {/* Section 2: Marketing & product */}
        <SectionLabel>Marketing & product updates</SectionLabel>
        <Card>
          <PrefRow label="New features & product news" desc="Updates about new tools, improvements, and feature launches" on={marketing} onToggle={() => setMarketing(p => !p)} last />
        </Card>
        <div style={{ padding: "0 16px 4px", fontSize: 12, color: T.color.tertiary, lineHeight: 1.4 }}>
          Covers product announcements, campaigns, and promotional content.
        </div>

        {/* Section 3: Reports & emails */}
        <SectionLabel>Reports & emails</SectionLabel>
        <Card>
          <div style={{ padding: "12px 16px", borderBottom: `1px solid ${T.color.borderLight}` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 15, fontWeight: 500 }}>Settlement reports</span>
              <Toggle on={settlementReport} onToggle={() => setSettlementReport(p => !p)} />
            </div>
            <div style={{ fontSize: 13, color: T.color.secondary, lineHeight: 1.4, marginBottom: 8 }}>Get notified when your settlement report is ready</div>
            {settlementReport && (
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: T.color.secondary, marginRight: 4 }}>Channels:</span>
                <ChannelChip label="In-app" active={true} onClick={() => {}} />
                <ChannelChip label="Email" active={settlementEmail} onClick={() => setSettlementEmail(p => !p)} />
              </div>
            )}
          </div>
          <div style={{ padding: "12px 16px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 15, fontWeight: 500 }}>PBL reports</span>
              <Toggle on={pblReport} onToggle={() => setPblReport(p => !p)} />
            </div>
            <div style={{ fontSize: 13, color: T.color.secondary, lineHeight: 1.4, marginBottom: 8 }}>Get notified when your pay-by-link report is ready</div>
            {pblReport && (
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: T.color.secondary, marginRight: 4 }}>Channels:</span>
                <ChannelChip label="In-app" active={true} onClick={() => {}} />
                <ChannelChip label="Email" active={pblEmail} onClick={() => setPblEmail(p => !p)} />
              </div>
            )}
          </div>
        </Card>
        <div style={{ padding: "0 16px 4px", fontSize: 12, color: T.color.tertiary, lineHeight: 1.4 }}>
          Report notification settings have moved here from Store settings for easier access.
        </div>

        <div style={{ height: 24 }} />
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP ROUTER
// ══════════════════════════════════════════════════════════════
function TeyaPrototype() {
  const [history, setHistory] = useState([{ screen: "home", param: null }]);
  const [terminals, setTerminals] = useState(INIT_TERMINALS);
  const [notifications, setNotifications] = useState(INIT_NOTIFICATIONS);
  const [motoActive, setMotoActive] = useState(false); // false | "pending" | "active"
  const [payLinksActive, setPayLinksActive] = useState(false);
  const [dir, setDir] = useState("fwd");
  const scrollRef = useRef(null);

  const unreadCount = notifications.filter(n => !n.read).length;
  const current = history[history.length - 1];
  const screen = current.screen;
  const param = current.param;

  const nav = useCallback((to, p) => {
    setDir("fwd");
    setHistory(h => [...h, { screen: to, param: p ?? null }]);
    setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, 10);
  }, []);

  const goBack = useCallback(() => {
    if (history.length <= 1) return;
    setDir("back");
    setHistory(h => h.slice(0, -1));
    setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, 10);
  }, [history.length]);

  const renderScreen = () => {
    switch (screen) {
      case "home": return <HomeScreen onAvatar={() => nav("account")} onBell={() => nav("notifications")} unreadCount={unreadCount} />;
      case "notifications": return <NotificationsScreen nav={nav} goBack={goBack} notifications={notifications} setNotifications={setNotifications} />;
      case "notifPrefs": return <NotifPrefsScreen goBack={goBack} />;
      case "account": return <AccountScreen nav={nav} goBack={goBack} terminals={terminals} />;
      case "stores": return <StoresScreen nav={nav} goBack={goBack} />;
      case "storeDetail": return <StoreDetailScreen nav={nav} goBack={goBack} storeId={param} />;
      case "catalogue": return <CatalogueScreen nav={nav} goBack={goBack} terminals={terminals} motoActive={motoActive} setMotoActive={setMotoActive} payLinksActive={payLinksActive} setPayLinksActive={setPayLinksActive} />;
      case "motoInfo": return <MotoInfoScreen nav={nav} goBack={goBack} motoActive={motoActive} setMotoActive={setMotoActive} />;
      case "payLinksInfo": return <PayLinksInfoScreen nav={nav} goBack={goBack} payLinksActive={payLinksActive} setPayLinksActive={setPayLinksActive} />;
      case "payLinksConfig": return <PayLinksConfigScreen nav={nav} goBack={goBack} />;
      case "ecommerce": return <EcommerceScreen nav={nav} goBack={goBack} />;
      case "checkoutPreview": return <CheckoutPreviewScreen goBack={goBack} param={param} />;
      case "terminals": return <TerminalsScreen nav={nav} goBack={goBack} terminals={terminals} />;
      case "detail": return <DetailScreen nav={nav} goBack={goBack} termId={param} terminals={terminals} setTerminals={setTerminals} />;
      case "payConfig": return <PayConfigScreen nav={nav} goBack={goBack} preselect={param} terminals={terminals} motoActive={motoActive} payLinksActive={payLinksActive} />;
      case "mealVoucher": return <MealVoucherScreen goBack={goBack} terminals={terminals} />;
      default: return <HomeScreen onAvatar={() => nav("account")} onBell={() => nav("notifications")} unreadCount={unreadCount} />;
    }
  };

  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-start", minHeight: "100vh", background: "#e8e8e3", padding: "24px 0", fontFamily: T.font }}>
      <div id="phone-frame" style={{ width: 393, height: 852, borderRadius: 44, border: "3px solid #222", boxShadow: "0 32px 64px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.05)", position: "relative", background: T.color.bgSubtle, overflow: "hidden" }}>
        <div
          ref={scrollRef}
          key={screen + String(param)}
          style={{ height: "100%", overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", animation: `${dir === "fwd" ? "slideInRight" : "slideInLeft"} .28s cubic-bezier(.25,.1,.25,1)` }}
        >
          {renderScreen()}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TeyaPrototype />);
</script>
</body>
</html>
